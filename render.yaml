databases:
  - name: ksg-awards-db
    plan: free
    databaseName: ksg_awards
    user: ksg_awards_user

services:
  - type: web
    name: ksg-awards-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: ksg-awards-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: SESSION_DRIVER
        value: cookie
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false
      - key: LOG_CHANNEL
        value: stderr

  - type: web
    name: ksg-awards
    runtime: docker
    plan: free
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        sync: false